<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новое домашнее задание — CRM LMS</title>
</head>
<body style="margin:0;padding:0;background:#f0f4ff;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4ff;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(59,130,246,0.10);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#2563eb 0%,#4f46e5 100%);padding:36px 40px;text-align:center;">
              <div>
                <span style="font-size:28px;">🎓</span>
                <span style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:0.5px;margin-left:10px;">CRM LMS</span>
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 40px 32px;">

              <div style="text-align:center;margin-bottom:24px;">
                <div style="display:inline-block;background:#eff6ff;border-radius:50%;width:64px;height:64px;line-height:64px;font-size:30px;">📚</div>
              </div>

              <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#1e293b;text-align:center;">Новое задание!</h1>
              <p style="margin:0 0 24px;font-size:15px;color:#64748b;text-align:center;">
                Привет, <strong style="color:#1e293b;" th:text="${studentName}">Студент</strong>!
              </p>

              <p style="margin:0 0 24px;font-size:15px;color:#475569;line-height:1.7;text-align:center;">
                Для вас назначено новое домашнее задание.
              </p>

              <!-- Info card -->
              <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:18px 22px;margin-bottom:28px;">
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="font-size:13px;color:#64748b;padding-bottom:12px;">📖 Урок</td>
                    <td style="font-size:14px;color:#1e293b;font-weight:600;text-align:right;padding-bottom:12px;" th:text="${lessonTitle}">Название урока</td>
                  </tr>
                  <tr>
                    <td style="font-size:13px;color:#64748b;padding-bottom:12px;">📝 Задание</td>
                    <td style="font-size:14px;color:#1e293b;font-weight:600;text-align:right;padding-bottom:12px;" th:text="${homeworkTitle}">Название задания</td>
                  </tr>
                  <tr>
                    <td style="font-size:13px;color:#64748b;">⏰ Срок сдачи</td>
                    <td style="font-size:14px;color:#dc2626;font-weight:600;text-align:right;" th:text="${dueDate}">01.01.2025</td>
                  </tr>
                </table>
              </div>

              <!-- Button -->
              <div style="text-align:center;margin-bottom:8px;">
                <a th:href="${frontendUrl + '/student/homework'}"
                   style="display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#2563eb 0%,#4f46e5 100%);color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;border-radius:10px;box-shadow:0 4px 14px rgba(37,99,235,0.35);">
                  Перейти к заданию →
                </a>
              </div>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8fafc;padding:20px 40px;text-align:center;border-top:1px solid #e2e8f0;">
              <p style="margin:0 0 4px;font-size:12px;color:#94a3b8;">Это автоматическое сообщение, пожалуйста, не отвечайте на него.</p>
              <p style="margin:0;font-size:12px;color:#cbd5e1;">© 2025 CRM LMS. Все права защищены.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
