spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        show_sql: false
        type.preferred_enum_jdbc_type: VARCHAR
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test

jwt:
  secret:
    access: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    refresh: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration:
    access: 900000
    refresh: 604800000

app:
  name: "CRM LMS Test"
  frontend-url: http://localhost:3000
  email:
    from: test@test.com
    from-name: "Test"

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: test-bucket
  profile-photos-folder: "profile-photos"
  chat-files-folder: "chat-files"
  max-file-size: 52428800

openrouter:
  api:
    key: test-key

telegram:
  bot:
    token: test-token
    username: test_bot

logging:
  level:
    kz.attractorschool.backend: WARN
    org.hibernate.SQL: WARN
